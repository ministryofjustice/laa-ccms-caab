<html th:fragment="layout" lang="en" class="govuk-template">

<head th:replace="~{partials/head :: head}"></head>

<body class="govuk-template__body">
<script th:attr="nonce=${cspNonce}">document.body.className += ' js-enabled' + ('noModule' in HTMLScriptElement.prototype ? ' govuk-frontend-supported' : '');</script>

<a href="#main-content" class="govuk-skip-link" data-module="govuk-skip-link">Skip to main content</a>

<th:block th:replace="~{partials/header :: header}"></th:block>

<div class="govuk-width-container">

    <div th:if="${breadcrumbs != null}" th:replace="${breadcrumbs}"></div>

    <th:block th:if="${userRoles != null and pageRoles != null}">
        <div th:replace="~{partials/actions :: restrictedActionsMessage(${userRoles}, ${pageRoles})}"></div>
    </th:block>

    <main class="govuk-main-wrapper ccms-padding-top-0" id="main-content" role="main">
        <th:block th:replace="${mainContent}">Default Main Content</th:block>
    </main>
</div>

<footer th:replace="~{partials/footer :: footer}"></footer>

<script type="module" src="/civil/webjars/govuk-frontend/dist/govuk/govuk-frontend.min.js" th:attr="nonce=${cspNonce}"></script>
<script type="module" th:attr="nonce=${cspNonce}">
    import {initAll} from '/civil/webjars/govuk-frontend/dist/govuk/govuk-frontend.min.js'
    initAll()
</script>
<script th:src="@{/ccms/caab.js}" th:attr="nonce=${cspNonce}"></script>
<!--TODO: Change when MoJ Frontend comes compiled with css-->
<script th:src="@{/webjars/ministryofjustice__frontend/moj/moj-frontend.min.js}" th:attr="nonce=${cspNonce}"></script>
<script th:attr="nonce=${cspNonce}">
    window.MOJFrontend.initAll();
</script>
</body>

</html>
