<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title=~{::title},mainContent=~{::#main-content},pageCategory=${'cases'},breadcrumbs=~{::#breadcrumbs})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{service.name} + ' - ' + #{counsel.search.caption}"></title>
</head>
<body>
<div class="govuk-width-container">
    <div id="breadcrumbs">
        <a th:href="@{/allocate-cost-limit}" class="govuk-back-link" th:text="#{caseCosts.allocateCostLimit.cancel}"></a>
    </div>
    <div id="main-content">

        <th:block>
            <span class="govuk-caption-l" th:text="#{counsel.search.caption}"/>
            <h1 class="govuk-heading-l" th:text="#{counsel.search.too_many_results}"></h1>
            <p class="govuk-body-l" th:text="#{site.tooManyResults(#{counsel.search})}"></p>
            <p class="govuk-body-l" th:text="#{counsel.search.results.refine}"></p>
            <div class="govuk-button-group">
                <a th:href="@{/counsel/search}" class="govuk-button govuk-button--secondary" data-module="govuk-button" th:text="#{site.back}"></a>
            </div>
        </th:block>

    </div>
</div>
</body>
</html>
