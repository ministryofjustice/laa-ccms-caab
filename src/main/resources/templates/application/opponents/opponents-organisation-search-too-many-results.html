<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title=~{::title},mainContent=~{::#main-content},pageCategory=${'cases'},breadcrumbs=~{::#breadcrumbs})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LAA CCMS - Search for an organisation</title>
</head>
<body>
<div class="govuk-width-container">
    <div id="breadcrumbs">
        <a th:href="${amendment} ? @{/amendments/sections/opponents/organisation/search} : @{/application/opponents/organisation/search}" class="govuk-back-link" th:text="#{site.returnToOrganisationSearch}"></a>
    </div>
    <div id="main-content">
        <span class="govuk-caption-l" th:text="${amendment} ? #{application.amendment} : #{application.opponents.organisationSearch.caption}"></span>
        <h1 class="govuk-heading-l">
            Organisation search - too many results
        </h1>
        <p class="govuk-body-l">
            Please return to refine your search criteria and try again.
        </p>
    </div>
</div>
</body>
</html>
