<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title=~{::title},mainContent=~{::#main-content},pageCategory=${'cases'},breadcrumbs=~{::#breadcrumbs})}"
      xmlns:th="http://www.thymeleaf.org" xmlns:govuk="http://www.thymeleaf.org">
<head>
    <title th:text="#{service.name} + ' - ' + #{application.start}"></title>
</head>
<body>
<div class="govuk-width-container">
    <div id="breadcrumbs">
        <a th:href="${amendment} ? @{/amendments/sections/opponents} : @{/application/sections/opponents}" class="govuk-back-link" th:text="#{site.cancelAndReturnToOpponents}"></a>
    </div>
    <div id="main-content">
        <form action="#" th:action="${amendment} ? @{/amendments/sections/opponents/{id}/edit(id=${opponent.id})} : @{/application/opponents/{id}/edit(id=${opponent.id})}" th:object="${opponent}" method="post">
            <div th:replace="~{partials/error-summary :: error-summary}"></div>
            <span class="govuk-caption-l" th:text="${amendment} ? #{application.amendment} : #{application.create}"></span>
            <h1 class="govuk-heading-l">
                Opponents and other parties
            </h1>
            <p class="govuk-body-l">
                Please enter the details for any opponents and other parties involved in this application/amendment.
            </p>
            <h1 class="govuk-heading-m">
                Edit organisation
            </h1>
            <div th:replace="~{application/partials/opponent-fragments :: createOrganisation}"></div>
            <div class="govuk-button-group">
                <govuk:button type="submit" th:text="#{site.confirm}"/>
            </div>
        </form>
    </div>
</div>
</body>
</html>
