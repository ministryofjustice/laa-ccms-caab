<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title=~{::title},mainContent=~{::#main-content},pageCategory=${'cases'},breadcrumbs=~{::#breadcrumbs})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LAA CCMS - Search for an organisation</title>
</head>
<body>
<div class="govuk-width-container">
    <div id="breadcrumbs">
        <a th:href="@{/{caseContext}/sections/opponents/organisation/search(caseContext=${caseContext.pathValue})}" class="govuk-back-link" th:text="#{site.returnToOrganisationSearch}"></a>
    </div>
    <div id="main-content">
        <span th:if="${caseContext.isApplication()}" class="govuk-caption-l" th:text="#{application.opponents.organisationSearch.caption}"></span>
        <span th:if="${caseContext.isAmendment()}" class="govuk-caption-l" th:text="#{application.amendment}"></span>
        <h1 class="govuk-heading-l">
            Organisation search - no results
        </h1>
        <p class="govuk-body-l">
            Please return to amend your search criteria and try again or create a new organisation by clicking the 'Create
            new organisation' button.
        </p>
        <a class="govuk-button govuk-button--secondary"
           data-module="govuk-button"
           th:href="@{/{caseContext}/sections/opponents/organisation/create(caseContext=${caseContext.pathValue})}">
            <span th:text="#{application.opponents.createNewOrganisation}"></span>
        </a>
    </div>
</div>
</body>
</html>
