<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title=~{::title},mainContent=~{::#main-content},pageCategory=${'cases'},breadcrumbs=~{::#breadcrumbs}, userRoles=${user.functions}, pageRoles='VC')}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{service.name} + ' - ' + #{counsel.search.caption}"></title>
</head>
<body>
<div class="govuk-width-container">
    <div id="breadcrumbs">
        <a th:href="@{/counsel/search}" class="govuk-back-link" th:text="#{site.returnToCounselSearch}"></a>
    </div>
    <div id="main-content">
        <span class="govuk-caption-l" th:text="#{counsel.search.caption}"></span>
        <h1 class="govuk-heading-l" th:text="#{counsel.search.results}"></h1>
        <p class="govuk-body-l" th:text="#{counsel.search.results.returned(${counselResultsPage.totalElements})}"></p>
        <p class="govuk-body-l" th:text="#{counsel.search.results.summary}"></p>
        <table class="govuk-table">
            <thead class="govuk-table__head">
                <tr class="govuk-table__row">
                    <th scope="col" class="govuk-table__header" th:text="#{counsel.search.name}"/>
                    <th scope="col" class="govuk-table__header" th:text="#{counsel.search.company}"/>
                    <th scope="col" class="govuk-table__header" th:text="#{counsel.search.laaCounselRef}"/>
                    <th scope="col" class="govuk-table__header" th:text="#{counsel.search.category}"/>
                    <th scope="col" class="govuk-table__header" th:text="#{counsel.search.county}"/>
                </tr>
            </thead>
            <tbody class="govuk-table__body">
                <tr class="govuk-table__row" th:each="row, rowStat : ${counselResultsPage.content}">

                    <td class="govuk-table__cell"><a class="govuk-link" th:href="@{/counsel/select(index=${(counselResultsPage.number * counselResultsPage.size) + rowStat.index})}" th:text="${row.name}"></a></td>
                    <td class="govuk-table__cell" th:text="${row.company}"></td>
                    <td class="govuk-table__cell" th:text="${row.legalAidSupplierNumber}"></td>
                    <td class="govuk-table__cell" th:text="${row.category}"></td>
                    <td class="govuk-table__cell" th:text="${row.county}"></td>
                </tr>
            </tbody>
        </table>
        <nav th:replace="~{partials/pagination :: pagination(page=${counselResultsPage})}"></nav>
    </div>
</div>
</body>
</html>
