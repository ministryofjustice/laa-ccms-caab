<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title=~{::title},mainContent=~{::#main-content},pageCategory=${'cases'},breadcrumbs=~{::#breadcrumbs})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{service.name} + ' - ' + #{application.start}"></title>
</head>
<body>
<div class="govuk-width-container">
    <div id="breadcrumbs">
        <a th:href="@{/{caseContext}/sections/linked-cases(caseContext=${caseContext.getPathValue()})}" class="govuk-back-link" th:text="#{application.generalDetails.linkCase.add.goBack}"></a>
    </div>
    <div id="main-content">
      <th:block th:replace="~{application/partials/linked-cases :: confirmLinkedCase(action=${'/' + caseContext.getPathValue() + '/sections/linked-cases/'+ linkedCaseId +'/confirm'})}"></th:block>
    </div>
</div>
</body>
</html>
