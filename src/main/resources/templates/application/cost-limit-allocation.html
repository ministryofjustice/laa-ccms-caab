<!DOCTYPE html>
<html lang="en"
      th:replace="~{layout :: layout(title=~{::title},mainContent=~{::#main-content},pageCategory=${'cases'},breadcrumbs=~{::#breadcrumbs})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="|#{service.name} - #{caseCosts.title}|"></title>
</head>
<body>
<div class="govuk-width-container">
    <div id="breadcrumbs">
        <a th:href="@{/case/details}" class="govuk-back-link"
           th:text="#{caseDetails.details.return}"></a>
    </div>

    <div id="main-content">
        <h1 class="govuk-heading-l" id="main-heading" th:text="#{caseCostDetails.title}"></h1>
        <p class="govuk-body" th:text="#{caseCostDetails.leadParagraph}"></p>

        <div class="govuk-grid-row">
            <div class="govuk-grid-column-full">
                <table class="govuk-table">
                    <thead>
                    <tr>
                        <th class="govuk-table__header" th:text="#{caseCosts.provider}"></th>
                        <th class="govuk-table__header" th:text="#{caseCosts.type}"></th>
                        <th class="govuk-table__header" th:text="#{caseCosts.amount}"></th>
                        <th class="govuk-table__header" th:text="#{caseCosts.providerCost}"></th>
                    </tr>
                    </thead>
                    <tbody class="govuk-table__body">
                    <tr class="govuk-table__row">
                        <th scope="row" class="govuk-table__header" th:text="#{caseDetails.costs.limitation.granted}"></th>
                        <td class="govuk-table__cell"></td>
                        <td class="govuk-table__cell"></td>
                        <td class="govuk-table__cell govuk-table__header"
                            th:text="${#numbers.formatCurrency(case.costs.grantedCostLimitation)}"></td>
                    </tr>
                    <tr class="govuk-table__row">
                        <td class="govuk-table__cell" th:text="${case.providerDetails.provider.displayValue}"></td>
                        <td class="govuk-table__cell" th:text="#{caseCosts.provider}"></td>
                        <td class="govuk-table__cell"
                            th:text="${currentProviderBilledAmount != null ? #numbers.formatCurrency(currentProviderBilledAmount) : ''}"></td>
                        <td class="govuk-table__cell govuk-!-font-weight-bold"
                            th:text="${#numbers.formatCurrency(mainProviderAllocation)}"></td>
                    </tr>
                    <tr class="govuk-table__row"
                        th:each="costEntryDetail : ${case.costs.costEntries.stream().distinct().toList()}">
                        <td class="govuk-table__cell" th:text="${costEntryDetail.resourceName}"></td>
                        <td class="govuk-table__cell" style="text-transform: capitalize"
                            th:text="${#strings.toLowerCase(costEntryDetail.costCategory)}"></td>
                        <td class="govuk-table__cell"
                            th:text="${#numbers.formatCurrency(costEntryDetail.amountBilled)}"></td>
                        <td class="govuk-table__cell"
                            th:text="${#numbers.formatCurrency(costEntryDetail.requestedCosts != null ? costEntryDetail.requestedCosts : 0)}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
</body>
</html>
