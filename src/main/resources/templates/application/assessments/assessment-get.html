<!DOCTYPE html>
<html lang="en" class="govuk-template">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="blue">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="shortcut icon" sizes="16x16 32x32 48x48"
        th:href="@{/assets/images/favicon.ico}" type="image/x-icon">
  <link rel="icon" sizes="48x48"
        th:href="@{/assets/images/favicon.ico}">
  <link rel="icon" sizes="any"
        th:href="@{/assets/images/favicon.svg}" type="image/svg+xml">
  <link rel="mask-icon"
        th:href="@{/assets/images/govuk-icon-mask.svg}" color="#0b0c0c">
  <link rel="apple-touch-icon"
        th:href="@{/assets/images/govuk-icon-180.png}">
  <link th:href="@{/ccms/moj.css}" rel="stylesheet">
  <link th:href="@{/ccms/ccms.css}" rel="stylesheet">
  <link th:href="@{/ccms/assessment-get.css}" rel="stylesheet">
  <link th:href="${interviewsCSS}" rel="stylesheet" type="text/css"/>
  <link th:href="${fontsCSS}" rel="stylesheet" type="text/css"/>
  <script th:src="@{/ccms/ccms.js}" th:nonce="${cspNonce}"></script>
  <!-- The OPA rulebase's screen script (script.js) calls jQuery.noConflict(true)
       and so needs a global jQuery to already exist. The rulebase ships its own
       jquery-3.6.3.min.js, but when the interview is embedded directly that copy
       can lose the load-order race against script.js (ReferenceError: jQuery is
       not defined). Providing jQuery on the page up front — as the legacy PUI did
       — guarantees it is defined before any OPA screen script runs. -->
  <script th:src="@{/ccms/jquery-3.6.3.min.js}" th:nonce="${cspNonce}"></script>
  <script th:src="${interviewsJS}" th:nonce="${cspNonce}"></script>
  <title th:text="${'LAA CCMS - ' + frameTitle}">LAA CCMS - Assessment</title>
</head>

<body class="govuk-template__body ccms-opa-page">
<script th:nonce="${cspNonce}">
    document.body.className += ' js-enabled' + ('noModule' in HTMLScriptElement.prototype ? ' govuk-frontend-supported' : '');</script>

<a href="#main-content" class="govuk-skip-link" data-module="govuk-skip-link">Skip to main content</a>

<th:block th:replace="~{partials/header :: header}"></th:block>

<div class="govuk-width-container">

  <th:block th:if="${assessmentType == 'MEANS' || assessmentType == 'MERITS'}">
    <div id="breadcrumbs">
      <a th:href="${cancelUrl}" class="govuk-back-link" th:text="${returnLinkText}"></a>
    </div>
  </th:block>


    <main class="govuk-main-wrapper govuk-!-padding-top-0" id="main-content" role="main">
      <div class="formInputArea">

      <th:block th:if="${assessmentType == 'MEANS' || assessmentType == 'MERITS'}">
        <h1 class="govuk-heading-l" th:text="${frameTitle}"></h1>
      </th:block>

      <div class="ccms-opa-shell">
        <div id="interview-wrapper" class="ccms-opa-interview-wrapper"></div>
      </div>
    </div>
  </main>
</div>

<footer th:replace="~{partials/footer :: footer}"></footer>

<script th:inline="javascript" th:nonce="${cspNonce}">
    // OPA interview is embedded directly into this page (no isolating iframe),
    // so it grows with the page flow exactly as the legacy PUI did. The OPA
    // stylesheet is scoped under .ccms-opa-interview-wrapper (assessment-get.css)
    // so it cannot bleed into the surrounding GOV.UK chrome.
    var el = document.getElementById("interview-wrapper");
    var resumeId = [[${resumeId}]];
    var checkpoint = [[${checkpoint}]];
    var val = [[${params}]];
    var user = [[${username}]];

    var paramData = {
        "val": val,
        "user": user,
        "resume-id": resumeId
    };

    var owdUrl = [[${owdUrl}]];
    var deploymentName = [[${deploymentName}]];

    function doExit(url) {
        window.location = url;
    }

    if (checkpoint === 'START') {
        OraclePolicyAutomationEmbedded.StartInterview(el,
            owdUrl,
            deploymentName,
            "en-GB",
            undefined,
            paramData,
            undefined,
            undefined,
            doExit);
    } else {
        OraclePolicyAutomationEmbedded.ResumeInterview(el,
            owdUrl,
            deploymentName,
            "en-GB",
            undefined,
            paramData,
            undefined,
            doExit);
    }
</script>

<script th:src="@{/assets/govuk/all.bundle.js}" th:nonce="${cspNonce}"></script>
<script th:nonce="${cspNonce}">
    if (window.GOVUKFrontend) {
        window.GOVUKFrontend.initAll();
    }
</script>
<script th:src="@{/assets/moj/all.bundle.js}" th:nonce="${cspNonce}"></script>
<script th:nonce="${cspNonce}">
    if (window.MOJFrontend) {
        window.MOJFrontend.initAll();
    }
</script>
</body>
</html>
