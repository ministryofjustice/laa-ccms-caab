<!DOCTYPE html>
<html lang="en"
      th:replace="~{layout :: layout(title=~{::title},mainContent=~{::#main-content},pageCategory=${'cases'},breadcrumbs=~{::#breadcrumbs})}"
      xmlns:th="http://www.thymeleaf.org" xmlns:govuk="http://www.thymeleaf.org">
<head>
    <title th:text="|#{service.name} - #{counsel.remove.title}|"></title>
</head>
<body>
<div class="govuk-width-container">
    <div id="breadcrumbs">
        <a th:href="@{/allocate-cost-limit}" class="govuk-back-link"
           th:text="#{caseCosts.allocateCostLimit.return}"></a>
    </div>

    <div id="main-content">
        <form th:action="@{/allocate-cost-limit/counsel/{index}/remove(index=${counselIndex})}"
              method="post">
            <h1 class="govuk-heading-l" id="main-heading"
                th:text="#{counsel.remove.heading(${counsel.resourceName})}"></h1>
            <p class="govuk-body-l" th:text="#{counsel.remove.paragraph(${counsel.resourceName})}"></p>

            <div class="govuk-button-group">
                <govuk:button type="submit" id="removeCounselConfirm" th:text="#{site.confirm}"/>
                <a th:href="@{/allocate-cost-limit}" class="govuk-link govuk-link--no-visited-state"
                   id="removeCounselCancel" th:text="#{caseCosts.allocateCostLimit.return}"></a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
