<!DOCTYPE html>
<html lang="en"
      th:replace="~{layout :: layout(title=~{::title},mainContent=~{::#main-content},pageCategory=${'cases'},breadcrumbs=~{::#breadcrumbs})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="|#{service.name} - #{caseCostDetails.title}|"></title>
</head>
<body>
<div class="govuk-width-container">
  <div id="breadcrumbs">
    <a th:href="@{/case/details}" class="govuk-back-link"
       th:text="#{caseDetails.details.return}"></a>
  </div>

  <div id="main-content">
    <h1 class="govuk-heading-l" id="main-heading" th:text="#{caseCostDetails.title}"></h1>
    <p class="govuk-body-l" id="lead-paragraph" th:text="#{caseCostDetails.leadParagraph}"></p>

    <div class="govuk-grid-row">
      <div class="govuk-grid-column-full">
        <table class="govuk-table">
          <thead>
          <tr>
            <th class="govuk-table__header ccms-width-30" th:text="#{caseDetails.costs.limitation}"></th>
            <th class="govuk-table__header" th:text="#{caseDetails.costs.amount}"></th>
            <th class="govuk-table__header" th:text="#{caseDetails.costs.action}"></th>
          </tr>
          </thead>
          <tbody class="govuk-table__body">
          <tr class="govuk-table__row">
            <td class="govuk-table__cell" th:text="#{caseDetails.costs.limitation.default}"></td>
            <td class="govuk-table__cell" th:text="${#numbers.formatCurrency(summary.proceedingsAndCosts.defaultCostLimitation)}"></td>
            <td class="govuk-table__cell"></td>
          </tr>
          <tr class="govuk-table__row">
            <td class="govuk-table__cell" th:text="#{caseDetails.costs.limitation.granted}"></td>
            <td class="govuk-table__cell" th:text="${#numbers.formatCurrency(summary.proceedingsAndCosts.grantedCostLimitation)}"></td>
            <td class="govuk-table__cell">
              <span th:if="${case.costs != null and case.costs.grantedCostLimitation != null and case.costs.costEntries != null and !#lists.isEmpty(case.costs.costEntries)}">
              <a class="govuk-link govuk-link--no-visited-state"
                 id="case-cost-limitation-link"
                 th:href="@{/case/details/costs/allocation}">
                <th:block th:text="#{caseCostDetails.allocation.link}"/>
              </a>
                </span>
            </td>
          </tr>
          <tr class="govuk-table__row">
            <td class="govuk-table__cell" th:text="#{caseDetails.costs.limitation.requested}"></td>
            <td class="govuk-table__cell" th:text="${#numbers.formatCurrency(summary.proceedingsAndCosts.requestedCostLimitation)}"></td>
            <td class="govuk-table__cell"></td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>
