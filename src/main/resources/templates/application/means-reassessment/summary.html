<!DOCTYPE html>
<html lang="en"
      th:replace="~{layout :: layout(title=~{::title},mainContent=~{::#main-content},pageCategory=${'cases'},breadcrumbs=~{::#breadcrumbs})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="#{service.name} + ' - ' + #{action.completeMeansReassessment.name}"></title>
</head>
<body>
<div class="govuk-width-container">
  <div id="breadcrumbs">
    <a th:href="@{/case/overview}" class="govuk-back-link"
       th:text="#{site.returnToCaseOverview}"></a>
  </div>
  <div id="main-content">
    <span class="govuk-caption-l" th:text="#{case.overview}"></span>
    <h1 class="govuk-heading-l" th:text="#{action.completeMeansReassessment.name}"></h1>

    <div class="govuk-summary-card">
      <div class="govuk-summary-card__title-wrapper">
        <h2 class="govuk-summary-card__title" th:text="#{application.section.means}"></h2>
        <ul class="govuk-summary-card__actions">
          <li class="govuk-summary-card__action">
            <a class="govuk-link govuk-link--no-visited-state"
               th:href="@{/amendments/assessments(assessment='means', invoked-from='CCMS_MNA05')}"
               th:text="${assessmentComplete ? #messages.msg('site.edit') : #messages.msg('application.section.means')}"></a>
          </li>
          <li class="govuk-summary-card__action">
            <a class="govuk-link govuk-link--no-visited-state"
               th:href="@{/means-reassessment/delete}"
               th:text="#{site.delete}"></a>
          </li>
        </ul>
      </div>
      <div class="govuk-summary-card__content">
        <dl class="govuk-summary-list">
          <div class="govuk-summary-list__row govuk-summary-list__row--no-actions">
            <dt class="govuk-summary-list__key" th:text="#{common.status}"></dt>
            <dd class="govuk-summary-list__value" th:text="${assessmentStatus}"></dd>
          </div>
        </dl>
      </div>
    </div>

    <div class="govuk-button-group">
      <a th:if="${canSubmit}" th:href="@{/means-reassessment/declaration}" role="button"
         draggable="false" class="govuk-button" data-module="govuk-button">Submit</a>
      <button th:unless="${canSubmit}" type="button" disabled aria-disabled="true"
              class="govuk-button" data-module="govuk-button">Submit</button>
      <a class="govuk-link" th:href="@{/case/overview}"
         th:text="#{site.cancelAndReturnToCaseOverview}"></a>
    </div>
  </div>
</div>
</body>
</html>
