<!DOCTYPE html>
<html lang="en"
      th:replace="~{layout :: layout(title=~{::title},mainContent=~{::#main-content},pageCategory=${'cases'},breadcrumbs=~{::#breadcrumbs})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="#{service.name} + ' - Sign declaration'"></title>
</head>
<body>
<div class="govuk-width-container">
  <div id="breadcrumbs">
    <a th:href="@{/means-reassessment/summary}" class="govuk-back-link">Back</a>
  </div>
  <div id="main-content">
    <form th:action="@{/means-reassessment/declaration}"
          th:object="${summarySubmissionFormData}" method="post">
      <div th:replace="~{partials/error-summary :: error-summary}"></div>
      <span class="govuk-caption-l" th:text="#{action.completeMeansReassessment.name}"></span>
      <h1 class="govuk-heading-l">Sign declaration</h1>
      <p class="govuk-body-l">
        Please complete the declaration below by selecting the statements to confirm your agreement.
      </p>

      <div class="govuk-form-group">
        <fieldset class="govuk-fieldset">
          <legend class="govuk-fieldset__legend govuk-fieldset__legend--m">
            <span class="govuk-fieldset__heading">Declarations</span>
          </legend>
          <div class="govuk-checkboxes">
            <div th:each="declarationOption, stat : *{declarationOptions}">
              <div class="govuk-checkboxes__item">
                <input class="govuk-checkboxes__input"
                       th:id="'declaration_' + ${stat.index}"
                       th:name="'declarationOptions[' + ${stat.index} + '].checked'"
                       type="checkbox"
                       th:checked="${declarationOption.checked}" />
                <label class="govuk-label govuk-checkboxes__label"
                       th:for="'declaration_' + ${stat.index}">
                  <span th:text="${declarationOption.fieldValueDisplayValue}"></span>
                </label>
              </div>
            </div>
          </div>
        </fieldset>
      </div>

      <button class="govuk-button" data-module="govuk-button">Continue</button>
    </form>
  </div>
</div>
</body>
</html>
