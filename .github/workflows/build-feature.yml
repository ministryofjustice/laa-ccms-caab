# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Build feature

on:
  push:
    branches-ignore:
      - main
      - 'feature-dev/*'
      - 'feature-test/*'

jobs:
  build:
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@v2
    permissions:
      contents: write
      packages: write
    with:
      semgrep_check: true
      java_version: '25'
      java_distribution: 'corretto'
      integration_test_task: "integrationTest"
      publish_package: 'false'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      aws_region: 'eu-west-2'

  get-branch-ref:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          tags: |
            type=ref,event=branch

  scan-image:
    needs: [ get-branch-ref ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/ecr-publish-image.yml@v2
    permissions:
      contents: read
      id-token: write
      security-events: write
    with:
      java_version: '25'
      java_distribution: 'corretto'
      image_version: ${{ format('{0}-{1}', vars.IMAGE_PREFIX, needs.get-branch-ref.outputs.version) }}
      publish: false
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      ecr_repository: ${{ vars.ECR_REPOSITORY }}
      ecr_region: ${{ vars.ECR_REGION }}
      ecr_role_to_assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
      snyk_token: ${{ secrets.SNYK_TOKEN }}
